<div id="aire-admin-lock" aria-hidden="true">

      <button id="aire-admin-enter" class="aire-btn aire-btn-primary">Entrar</button>

    </div>

    </div>

<button id="aire-admin-logout" type="button">⛔ Cerrar sesión</button>

<script>
(function () {
  var ADMIN_PIN = "4321";
  var SESSION_KEY = "aire_admin_unlock_ok_v2";

  var lock = document.getElementById("aire-admin-lock");
  var pinInput = document.getElementById("aire-admin-pin");
  var enterBtn = document.getElementById("aire-admin-enter");
  var publicBtn = document.getElementById("aire-admin-public");
  var errorBox = document.getElementById("aire-admin-error");
  var logoutBtn = document.getElementById("aire-admin-logout");

  if (!lock || !pinInput || !enterBtn || !publicBtn || !errorBox || !logoutBtn) return;

  function getHash() {
    return window.location.hash || "#/";
  }

  function isPublicRoute() {
    return getHash().indexOf("#/public/") === 0;
  }

  function isUnlocked() {
    try {
      return sessionStorage.getItem(SESSION_KEY) === "ok";
    } catch (e) {
      return false;
    }
  }

  function setUnlocked(val) {
    try {
      if (val) {
        sessionStorage.setItem(SESSION_KEY, "ok");
      } else {
        sessionStorage.removeItem(SESSION_KEY);
      }
    } catch (e) {}
  }

  function updateLogoutButton() {
    if (!isPublicRoute() && isUnlocked()) {
      logoutBtn.classList.add("aire-show");
    } else {
      logoutBtn.classList.remove("aire-show");
    }
  }

  function showLock() {
    lock.classList.add("aire-show");
    lock.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    updateLogoutButton();
    setTimeout(function () {
      try { pinInput.focus(); } catch (e) {}
    }, 60);
  }

  function hideLock() {
    lock.classList.remove("aire-show");
    lock.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
    errorBox.textContent = "";
    pinInput.value = "";
    updateLogoutButton();
  }

  function enforceLock() {
    if (isPublicRoute()) {
      hideLock();
      return;
    }

    if (isUnlocked()) {
      hideLock();
      return;
    }

    showLock();
  }

  enterBtn.addEventListener("click", function () {
    var pin = (pinInput.value || "").trim();
    if (pin === ADMIN_PIN) {
      setUnlocked(true);
      hideLock();
    } else {
      errorBox.textContent = "PIN incorrecto.";
      try {
        pinInput.focus();
        pinInput.select();
      } catch (e) {}
    }
  });

  pinInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      enterBtn.click();
    }
  });

  publicBtn.addEventListener("click", function () {
    var current = getHash();
    var m = current.match(/#\/public\/([A-Z0-9_-]+)/i);
    if (m) {
      window.location.hash = "#/public/" + m[1];
    } else {
      errorBox.textContent = "No hay una vista pública abierta.";
    }
  });

  logoutBtn.addEventListener("click", function () {
    setUnlocked(false);
    window.location.hash = "#/";
    window.location.reload();
  });

  window.addEventListener("hashchange", enforceLock);
  window.addEventListener("load", enforceLock);
  document.addEventListener("DOMContentLoaded", enforceLock);
  setTimeout(enforceLock, 120);
})();
</script>

  }
</style>

<script>
(function () {
  function isPublicRoute() {
    return (window.location.hash || "").indexOf("#/public/") === 0;
  }

  function makeFab() {
    let fab = document.getElementById("aire-backup-fab");
    if (!fab) {
      fab = document.createElement("button");
      fab.id = "aire-backup-fab";
      fab.type = "button";
      fab.setAttribute("aria-label", "Abrir respaldo rápido");
      fab.innerHTML = `
        <span class="aire-tip">Respaldo rápido</span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3L4 7V12C4 17 7.4 21.3 12 22C16.6 21.3 20 17 20 12V7L12 3Z" fill="white" fill-opacity="0.20"/>
          <path d="M12 3L4 7V12C4 17 7.4 21.3 12 22C16.6 21.3 20 17 20 12V7L12 3Z" stroke="white" stroke-width="1.6"/>
          <path d="M9 12L11 14L15.5 9.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;
      document.body.appendChild(fab);
    }
    return fab;
  }

  function findBackupPanel() {
    const all = Array.from(document.querySelectorAll("div,section,aside"));
    for (const el of all) {
      const txt = (el.innerText || "").trim();
      if (!txt) continue;
      if (txt.includes("Respaldo rápido") && txt.includes("Exportar")) {
        return el;
      }
    }
    return null;
  }

  function hidePublicStuff(panel, fab) {
    if (isPublicRoute()) {
      if (panel) panel.style.display = "none";
      if (fab) fab.style.display = "none";
      return true;
    }
    return false;
  }

  function patchPanel() {
    const panel = findBackupPanel();
    const fab = makeFab();

    if (hidePublicStuff(panel, fab)) return;

    if (!panel) {
      fab.style.display = "none";
      return;
    }

    if (!panel.dataset.aireBackupPatched) {
      panel.dataset.aireBackupPatched = "1";
      panel.classList.add("aire-backup-panel-patched");
      panel.style.display = "none";

      if (!panel.querySelector(".aire-backup-close")) {
        const close = document.createElement("button");
        close.className = "aire-backup-close";
        close.type = "button";
        close.innerHTML = "&times;";
        close.title = "Cerrar";
        close.addEventListener("click", function (e) {
          e.stopPropagation();
          panel.style.display = "none";
          fab.style.display = "flex";
        });
        panel.appendChild(close);
      }

      fab.addEventListener("click", function (e) {
        e.stopPropagation();
        if (isPublicRoute()) return;
        panel.style.display = "block";
        fab.style.display = "none";
      });

      document.addEventListener("click", function (e) {
        if (panel.style.display !== "none" && !panel.contains(e.target)) {
          panel.style.display = "none";
          if (!isPublicRoute()) fab.style.display = "flex";
        }
      }, true);

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && panel.style.display !== "none") {
          panel.style.display = "none";
          if (!isPublicRoute()) fab.style.display = "flex";
        }
      });

      panel.addEventListener("click", function (e) {
        e.stopPropagation();
      });
    }

    fab.style.display = "flex";
  }

  function boot() {
    patchPanel();

    const obs = new MutationObserver(function () {
      patchPanel();
    });

    obs.observe(document.documentElement, {
      childList: true,
      subtree: true
    });

    window.addEventListener("hashchange", function () {
      setTimeout(patchPanel, 90);
    });

    window.addEventListener("load", function () {
      setTimeout(patchPanel, 120);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
